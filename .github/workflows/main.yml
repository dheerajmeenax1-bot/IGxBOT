    task: asyncio.Task = None

class OptimizedInstagramBot:
    def __init__(self):
        self.cl = Client()
        self.executor = ThreadPoolExecutor(max_workers=4)
    
    async def safe_send(self, target_id: str, message: str, target_type: str = 'user'):
        loop = asyncio.get_event_loop()
        try:
            if target_type == 'thread':
                result = await loop.run_in_executor(
                    self.executor,
                    lambda: self.cl.direct_send(message, thread_ids=[target_id])
                )
            else:
                result = await loop.run_in_executor(
                    self.executor,
                    lambda: self.cl.direct_send(message, user_ids=[int(target_id)])
                )
            return True, "Sent"
        except Exception as e:
            return False, str(e)

ig_bot = OptimizedInstagramBot()

def is_authorized(user_id: int) -> bool:
    return user_id in AUTHORIZED_USERS

def load_all_data():
    global AUTHORIZED_USERS, user_sessions, user_speeds, active_tasks, task_status
    if os.path.exists("authorized.json"):
        with open("authorized.json", 'r') as f: AUTHORIZED_USERS = set(json.load(f))
    if os.path.exists("sessions.json"):
        with open("sessions.json", 'r') as f: user_sessions = json.load(f)
    if os.path.exists("speeds.json"):
        with open("speeds.json", 'r') as f: user_speeds = json.load(f)
    if os.path.exists("tasks.json"):
        with open("tasks.json", 'r') as f: 
            task_data = json.load(f)
            task_status.update(task_data.get('status', {}))

def save_all_data():
    data = {
        'status': task_status
    }
    with open("tasks.json", 'w') as f: json.dump(data, f)
    with open("authorized.json", 'w') as f: json.dump(list(AUTHORIZED_USERS), f)
    with open("sessions.json", 'w') as f: json.dump(user_sessions, f)
    with open("speeds.json", 'w') as f: json.dump(user_speeds, f)

user_sessions: Dict[int, Dict[str, Any]] = {}
user_speeds: Dict[int, str] = {}

async def check_access(update: Update, context: ContextTypes.DEFAULT_TYPE) -> bool:
    user_id = update.effective_user.id
    if is_authorized(user_id): return True
    if user_id == OWNER_ID: return True
    
    keyboard = [[InlineKeyboardButton("🔐 Request Access", callback_data="request_access")]]
    await update.message.reply_text(
        "🔒 *Private Bot* - Request access from owner!", parse_mode='Markdown',
        reply_markup=InlineKeyboardMarkup(keyboard)
    )
    return False

async def terminate_task(user_id: int, update_msg_id: int = None):
    if user_id in active_tasks:
        task = active_tasks[user_id]
        task.cancel()
        try:
            await task
        except asyncio.CancelledError:
            pass
        del active_tasks[user_id]
        task_status.pop(user_id, None)
        save_all_data()
        logger.info(f"Task terminated for user {user_id}")

async def mass_sender(user_id: int, chat_id: str, message: str, speed: str, count: int, update_msg_id: int, app, target_type: str = 'user'):
    try:
        config = SPEED_OPTIONS[speed]
        task_status[user_id] = {'status': 'running', 'progress': 0, 'success': 0, 'failed': 0}
        
        start_time = time.time()
        success, failed = 0, 0
        
        for i in range(count):
            if user_id not in active_tasks:
                break
                
            result, msg = await ig_bot.safe_send(chat_id, message, target_type)
            if result: success += 1
            else: failed += 1
            
            task_status[user_id] = {
                'status': 'running',
                'progress': i+1,
                'total': count,
                'success': success,
                'failed': failed,
                'speed': config['name']
            }
            
            if (i + 1) % 3 == 0 or i == count - 1:
                elapsed = time.time() - start_time
                rate = success / max(elapsed/60, 0.1)
                progress_text = (
                    f"📤 **{i+1}/{count}** | ⏱️ {elapsed:.1f}s\n"
                    f"✅ {success} | ❌ {failed} | 📊 **{rate:.0f} msg/min**\n"
                    f"⚡ **{config['name']}**"
                )
                
                try:
                    await app.bot.edit_message_text(
                        progress_text, chat_id=OWNER_ID, 
                        message_id=update_msg_id, parse_mode='Markdown'
                    )
                except:
                    pass
            
            if i < count - 1:
                await asyncio.sleep(config['delay'])
        
        total_time = time.time() - start_time
        final_rate = (success + failed) / max(total_time/60, 0.1)
        final_msg = (
            f"✅ **COMPLETE!** 🎉\n\n"
            f"📊 **Stats:**\n"
            f"✅ Success: {success}\n❌ Failed: {failed}\n"
            f"⏱️ Time: {total_time:.1f}s\n📈 Rate: **{final_rate:.0f} msg/min**\n"
            f"⚡ Speed: **{config['name']}**"
        )
        
        await app.bot.send_message(OWNER_ID, final_msg, parse_mode='Markdown')
        
    except asyncio.CancelledError:
        await app.bot.send_message(OWNER_ID, "🛑 *Task cancelled by user!*", parse_mode='Markdown')
    except Exception as e:
        await app.bot.send_message(OWNER_ID, f"❌ Error: {str(e)}", parse_mode='Markdown')
    finally:
        if user_id in active_tasks:
            del active_tasks[user_id]
        task_status.pop(user_id, None)
        save_all_data()


name: Run Instagram Speed Bot

# Bot kab trigger hoga?
on:
  push:
    branches:
      - main  # Jab aap code update karenge
  workflow_dispatch: # Isse "Run workflow" ka button aayega manually start karne ke liye

jobs:
  build:
    runs-on: ubuntu-latest # GitHub ka virtual computer

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3 # Aapka code server par download karega

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Python install karega

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # Libraries install karega

      - name: Run Bot
        env:
          # Ye GitHub Secrets se aapka token uthayega
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python IGxSPM.py # Aapki main file ko run karega
        

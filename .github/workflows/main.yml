# Global task management
active_tasks: Dict[int, asyncio.Task] = {}
task_status: Dict[int, Dict] = {}

@dataclass
class SendTask:
    user_id: int
    chat_id: str
    message: str
    speed: str
    count: int
    task: asyncio.Task = None

class OptimizedInstagramBot:
    def __init__(self):
        self.cl = Client()
        self.executor = ThreadPoolExecutor(max_workers=4)
    
    async def safe_send(self, chat_id: str, message: str):
        """Thread-safe Instagram send"""
        loop = asyncio.get_event_loop()
        try:
            result = await loop.run_in_executor(
                self.executor, 
                lambda: self.cl.direct_send(message, thread_ids=[chat_id])
            )
            return True, "Sent"
        except Exception as e:
            return False, str(e)

# Global bot instance
ig_bot = OptimizedInstagramBot()

def is_authorized(user_id: int) -> bool:
    return user_id in AUTHORIZED_USERS

# File management
def load_all_data():
    global AUTHORIZED_USERS, user_sessions, user_speeds, active_tasks, task_status
    if os.path.exists("authorized.json"):
        with open("authorized.json", 'r') as f: AUTHORIZED_USERS = set(json.load(f))
    if os.path.exists("sessions.json"):
        with open("sessions.json", 'r') as f: user_sessions = json.load(f)
    if os.path.exists("speeds.json"):
        with open("speeds.json", 'r') as f: user_speeds = json.load(f)
    if os.path.exists("tasks.json"):
        with open("tasks.json", 'r') as f: 
            task_data = json.load(f)
            active_tasks.update({int(k): v for k, v in task_data.get('tasks', {}).items()})
            task_status.update(task_data.get('status', {}))

def save_all_data():
    data = {
        'tasks': {str(k): v for k, v in active_tasks.items()},
        'status': task_status
    }
    with open("tasks.json", 'w') as f: json.dump(data, f)
    with open("authorized.json", 'w') as f: json.dump(list(AUTHORIZED_USERS), f)
    with open("sessions.json", 'w') as f: json.dump(user_sessions, f)
    with open("speeds.json", 'w') as f: json.dump(user_speeds, f)

# User data
user_sessions: Dict[int, Dict[str, Any]] = {}
user_speeds: Dict[int, str] = {}

async def check_access(update: Update, context: ContextTypes.DEFAULT_TYPE) -> bool:
    user_id = update.effective_user.id
    if is_authorized(user_id): return True
    if user_id == OWNER_ID: return True
    
    keyboard = [[InlineKeyboardButton("🔐 Request Access", callback_data="request_access")]]
    await update.message.reply_text(
        "🔒 *Private Bot* - Request access from owner!", parse_mode='Markdown',
        reply_markup=InlineKeyboardMarkup(keyboard)
    )
    return False

async def terminate_task(user_id: int, update_msg_id: int = None):
    """Force terminate task"""
    if user_id in active_tasks:
        task = active_tasks[user_id]
        task.cancel()
        try:
            await task
        except asyncio.CancelledError:
            pass
        del active_tasks[user_id]
        task_status.pop(user_id, None)
        save_all_data()
        
        if update_msg_id:
            await context.bot.edit_message_text(
                "🛑 *Task TERMINATED!* ✅", 
                chat_id=OWNER_ID, message_id=update_msg_id
            )
        logger.info(f"Task terminated for user {user_id}")

async def mass_sender(user_id: int, chat_id: str, message: str, speed: str, count: int, update_msg_id: int):
    """Optimized mass sender with live updates and cancel support"""
    try:
        config = SPEED_OPTIONS[speed]
        task_status[user_id] = {'status': 'running', 'progress': 0, 'success': 0, 'failed': 0}
        
        start_time = time.time()
        success, failed = 0, 0
        
        for i in range(count):
            if user_id not in active_tasks:  # Check if cancelled
                break
                
            # Send message
            result, msg = await ig_bot.safe_send(chat_id, message)
            if result: success += 1
            else: failed += 1
            
            # Update status
            task_status[user_id] = {
                'status': 'running',
                'progress': i+1,
                'total': count,
                'success': success,
                'failed': failed,
                'speed': config['name']
            }
            
            # Live update every 3 messages
            if (i + 1) % 3 == 0 or i == count - 1:
                elapsed = time.time() - start_time
                rate = success / max(elapsed/60, 0.1)
                progress_text = (
                    f"📤 **{i+1}/{count}** | ⏱️ {elapsed:.1f}s\n"
                    f"✅ {success} | ❌ {failed} | 📊 **{rate:.0f} msg/min**\n"
                    f"⚡ **{config['name']}**"
                )
                
                try:
                    await context.bot.edit_message_text(
                        progress_text, chat_id=OWNER_ID, 
                        message_id=update_msg_id, parse_mode='Markdown'
                    )
                except:
                    pass
            
            if i < count - 1:
                await asyncio.sleep(config['delay'])
        
        # Final status
        total_time = time.time() - start_time
        final_rate = (success + failed) / max(total_time/60, 0.1)
        final_msg = (
            f"✅ **COMPLETE!** 🎉\n\n"
            f"📊 **Stats:**\n"
            f"✅ Success: {success}\n❌ Failed: {failed}\n"
            f"⏱️ Time: {total_time:.1f}s\n📈 Rate: **{final_rate:.0f} msg/min**\n"
            f"⚡ Speed: **{config['name']}**"
        )
        
        await context.bot.send_message(OWNER_ID, final_msg, parse_mode='Markdown')
        
    except asyncio.CancelledError:
        await context.bot.send_message(OWNER_ID, "🛑 *Task cancelled by user!*", parse_mode='Markdown')
    except Exception as e:
        await context.bot.send_message(OWNER_ID, f"❌ Error: {str(e)}", parse_mode='Markdown')
    finally:
        if user_id in active_tasks:
            del active_tasks[user_id]
        task_status.pop(user_id, None)
        save_all_data()

async def start(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    if not await check_access(update, context): return
    
    speed = user_speeds.get(str(user_id), 'normal')
    speed_name = SPEED_OPTIONS[speed]['name']
    
    # Check active tasks
    task_info = ""
    if user_id in active_tasks:
        status = task_status.get(user_id, {})
        task_info = f"\n🟡 **ACTIVE TASK:** {status.get('progress', 0)}/{status.get('total', '?')}"
    
    keyboard = [
        [InlineKeyboardButton("⚡ Set Speed", callback_data="set_speed")],
        [InlineKeyboardButton("🔐 Login Session", callback_data="login_session")],
        [InlineKeyboardButton("👤 Login Creds", callback_data="login_creds")],
        [InlineKeyboardButton("📱 Chats", callback_data="select_target")]
    ]
    if user_id == OWNER_ID:
        keyboard.extend([
            [InlineKeyboardButton("👥 Manage Users", callback_data="manage_users")],
            [InlineKeyboardButton("📊 Active Tasks", callback_data="show_tasks")]
        ])
    
    reply_markup = InlineKeyboardMarkup(keyboard)
    await update.message.reply_text(
        f"🤖 *Instagram Mass Bot* v2.0\n\n"
        f"🚀 Speed: **{speed_name}**\n{task_info}\n\n"
        f"Choose action:",
        parse_mode='Markdown', reply_markup=reply_markup
    )

async def button_handler(update: Update, context: ContextTypes.DEFAULT_TYPE):
    query = update.callback_query
    await query.answer()
    user_id = query.from_user.id
    
    if not is_authorized(user_id) and user_id != OWNER_ID: 
        await query.edit_message_text("❌ Access denied!")
        return
    
    # SPEED SELECTION
    if query.data == "set_speed":
        keyboard = [[InlineKeyboardButton(config['name'], callback_data=f"speed_{k}")] 
                   for k, config in SPEED_OPTIONS.items()]
        keyboard.append([InlineKeyboardButton("❌ Back", callback_data="back_main")])
        await query.edit_message_text(
            "⚡ *Select Speed* (Risk ↑ Speed ↑):\n\n"
            "**⚠️ ULTRA = High ban risk!**\n\n"
            f"• 120 msg/min (0.5s)\n• 60 msg/min (1s)\n• 30 msg/min (2s)\n• 12 msg/min (5s)",
            parse_mode='Markdown', reply_markup=InlineKeyboardMarkup(keyboard)
        )
        return
    
    if query.data.startswith("speed_"):
        speed = query.data.split("_")[1]
        user_speeds[str(user_id)] = speed
        save_all_data()
        config = SPEED_OPTIONS[speed]
        await query.edit_message_text(
            f"✅ **{config['name']}** ({60/config['delay']:.0f} msg/min)\n\n"
            f"⚡ Ready! Use /start",
            parse_mode='Markdown'
        )
        return
    
    # TERMINATE BUTTON
    if query.data == "terminate":
        await terminate_task(user_id, query.message.message_id)
        return
    
    if query.data == "terminate_all":
        for uid in list(active_tasks.keys()):
            await terminate_task(uid)
        await query.edit_message_text("🛑 **ALL TASKS TERMINATED!**")
        return
    
    # START SENDING with TERMINATE BUTTON
    if query.data == "confirm_send":
        user_id = query.from_user.id
        data = user_sessions[user_id]
        speed = user_speeds.get(str(user_id), 'normal')
        config = SPEED_OPTIONS[speed]
        
        keyboard = [
            [InlineKeyboardButton("🚀 START SENDING", callback_data="send_now")],
            [InlineKeyboardButton("🛑 Cancel", callback_data="cancel")]
        ]
        reply_markup = InlineKeyboardMarkup(keyboard)
        
        await query.edit_message_text(
            f"🚀 *Ready to Send*\n\n"
            f"📱 `{data['target_chat']}`\n"
            f"📝 `{data['message'][:50]}...`\n"
            f"⚡ **{config['name']}** ({60/config['delay']:.0f} msg/min)\n"
            f"📊 **10 messages** (edit for more)\n\n"
            f"Confirm?",
            parse_mode='Markdown', reply_markup=reply_markup
        )
        return
    
    if query.data == "send_now":
        user_id = query.from_user.id
        data = user_sessions[user_id]
        speed = user_speeds.get(str(user_id), 'normal')
        
        # Create task with TERMINATE button
        keyboard = [
            [InlineKeyboardButton("🛑 TERMINATE NOW", callback_data="terminate")],
            [InlineKeyboardButton("📊 Status", callback_data="status")]
        ]
        reply_markup = InlineKeyboardMarkup(keyboard)
        
        msg = await context.bot.send_message(
            OWNER_ID, 
            f"🚀 **STARTING** | {SPEED_OPTIONS[speed]['name']}\n📱 {data['target_chat']}",
            reply_markup=reply_markup, parse_mode='Markdown'
        )
        
        # Start background task
        task = asyncio.create_task(
            mass_sender(user_id, data['target_chat'], data['message'], speed, 10, msg.message_id)
        )
        active_tasks[user_id] = task
        save_all_data()
        return

# Owner task management
async def show_tasks(update: Update, context: ContextTypes.DEFAULT_TYPE):
    if update.effective_user.id != OWNER_ID: return
    
    if not active_tasks:
        await update.message.reply_text("✅ No active tasks")
        return
    
    msg = "📊 **ACTIVE TASKS:**\n\n"
    for uid, task in active_tasks.items():
        status = task_status.get(uid, {})
        msg += f"👤 `{uid}`: {status.get('progress', 0)}/{status.get('total', '?')} "
        msg += f"({SPEED_OPTIONS[status.get('speed', 'normal')]['name']})\n"
    
    keyboard = [[InlineKeyboardButton("🛑 TERMINATE ALL", callback_data="terminate_all")]]
    await update.message.reply_text(msg, reply_markup=InlineKeyboardMarkup(keyboard), parse_mode='Markdown')


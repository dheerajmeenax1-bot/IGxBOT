async def handle_message(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    if not is_authorized(user_id) and user_id != OWNER_ID:
        return
    
    text = update.message.text
    awaiting = context.user_data.get('awaiting')
    
    if not awaiting:
        await update.message.reply_text("Use /start to begin.")
        return

    if awaiting == 'sessionid_cookie':
        sessionid = text.strip()
        await update.message.reply_text("⏳ Session ID se login ho raha hai...")
        try:
            loop = asyncio.get_event_loop()
            await loop.run_in_executor(None, lambda: ig_bot.cl.login_by_sessionid(sessionid))
            if user_id not in user_sessions:
                user_sessions[user_id] = {}
            user_sessions[user_id]['logged_in'] = True
            user_sessions[user_id]['sessionid'] = sessionid
            save_all_data()
            context.user_data['awaiting'] = None
            username = ig_bot.cl.username
            await update.message.reply_text(
                f"✅ *Login ho gaya!*\n\n👤 Account: `{username}`\n\n/start karo aur messages bhejo!",
                parse_mode='Markdown'
            )
        except Exception as e:
            await update.message.reply_text(
                f"❌ *Session ID galat hai ya expire ho gaya!*\n\n"
                f"Error: `{str(e)}`\n\n"
                f"Dobara fresh `sessionid` copy karo aur try karo.",
                parse_mode='Markdown'
            )
        return

    if awaiting == 'session':
        try:
            ig_bot.cl.load_settings(json.loads(text))
            if user_id not in user_sessions:
                user_sessions[user_id] = {}
            user_sessions[user_id]['logged_in'] = True
            user_sessions[user_id]['session'] = text
            save_all_data()
            context.user_data['awaiting'] = None
            await update.message.reply_text("✅ Session loaded! Use /start to continue.")
        except Exception as e:
            await update.message.reply_text(f"❌ Invalid session: {str(e)}")
        return

    if awaiting == 'username':
        context.user_data['ig_username'] = text
        context.user_data['awaiting'] = 'password'
        await update.message.reply_text("🔑 Enter your Instagram password:")
        return

    if awaiting == 'password':
        username = context.user_data.get('ig_username', '')
        password = text
        main_loop = asyncio.get_event_loop()

        event = threading.Event()
        challenge_events[user_id] = {'event': event, 'code': None}

        def challenge_handler(uname, choice):
            asyncio.run_coroutine_threadsafe(
                update.message.reply_text(
                    f"📧 *Instagram ne code bheja!*\n\nEmail ya SMS pe aaya 6-digit code daalo:",
                    parse_mode='Markdown'
                ),
                main_loop
            )
            evdata = challenge_events.get(user_id, {})
            evdata['event'].wait(timeout=300)
            return evdata.get('code') or ''

        ig_bot.cl.challenge_code_handler = challenge_handler
        context.user_data['awaiting'] = 'challenge_code'

        async def do_login():
            loop = asyncio.get_event_loop()
            try:
                await loop.run_in_executor(None, lambda: ig_bot.cl.login(username, password))
                if user_id not in user_sessions:
                    user_sessions[user_id] = {}
                user_sessions[user_id]['logged_in'] = True
                save_all_data()
                context.user_data['awaiting'] = None
                challenge_events.pop(user_id, None)
                await update.message.reply_text("✅ Login ho gaya! /start karo.")
            except Exception as e:
                context.user_data['awaiting'] = None
                challenge_events.pop(user_id, None)
                await update.message.reply_text(f"❌ Login failed: {str(e)}\n\nDobara /start karo.")

        asyncio.create_task(do_login())
        await update.message.reply_text("⏳ Login ho raha hai... code aane ka wait karo.")
        return

    if awaiting == 'challenge_code':
        evdata = challenge_events.get(user_id)
        if evdata:
            evdata['code'] = text.strip()
            evdata['event'].set()
            context.user_data['awaiting'] = None
            await update.message.reply_text("⏳ Code check ho raha hai...")
        else:
            await update.message.reply_text("❌ Session expire ho gaya. Dobara /start karo.")
        return

    if awaiting == 'target_chat':
        raw = text.strip().rstrip('/')
        ig_user_id = None
        display_name = raw

        # DM link: instagram.com/direct/t/123456
        if '/direct/t/' in raw:
            thread_id = raw.split('/direct/t/')[-1].strip()
            # thread_id se user resolve karne ki jagah thread_id store karo
            if user_id not in user_sessions:
                user_sessions[user_id] = {}
            user_sessions[user_id]['target_chat'] = thread_id
            user_sessions[user_id]['target_type'] = 'thread'
            user_sessions[user_id]['target_display'] = thread_id
            save_all_data()
            context.user_data['awaiting'] = 'message'
            await update.message.reply_text(
                f"✅ Thread ID set: `{thread_id}`\n\n📝 Ab message likho jo bhejana hai:",
                parse_mode='Markdown'
            )
            return

        # Profile link: instagram.com/username
        if 'instagram.com/' in raw:
            username = raw.split('instagram.com/')[-1].split('?')[0].strip('/')
        else:
            username = raw.lstrip('@')

        # Check if it's a pure number (user_id directly)
        if username.isdigit():
            ig_user_id = username
            display_name = username
        else:
            # Resolve username to user_id
            await update.message.reply_text(f"🔍 `{username}` ka ID dhundh raha hun...")
            try:
                loop = asyncio.get_event_loop()
                ig_user_id = str(await loop.run_in_executor(
                    None, lambda: ig_bot.cl.user_id_from_username(username)
                ))
                display_name = f"@{username}"
            except Exception as e:
                await update.message.reply_text(
                    f"❌ Username nahi mila: `{username}`\n\nError: {str(e)}\n\nSahi username daalo.",
                    parse_mode='Markdown'
                )
                return

        if user_id not in user_sessions:
            user_sessions[user_id] = {}
        user_sessions[user_id]['target_chat'] = ig_user_id
        user_sessions[user_id]['target_type'] = 'user'
        user_sessions[user_id]['target_display'] = display_name
        save_all_data()
        context.user_data['awaiting'] = 'message'
        await update.message.reply_text(
            f"✅ Target set: *{display_name}* (`{ig_user_id}`)\n\n📝 Ab message likho jo bhejana hai:",
            parse_mode='Markdown'
        )
        return

    if awaiting == 'message':
        if user_id not in user_sessions:
            user_sessions[user_id] = {}
        user_sessions[user_id]['message'] = text
        save_all_data()
        context.user_data['awaiting'] = 'count'
        await update.message.reply_text(
            "🔢 *Kitne messages bhejne hain?*\n\n"
            "Sirf number likho (jaise: `50`, `100`, `500`)\n\n"
            "⚠️ Zyada messages = zyada ban risk!",
            parse_mode='Markdown'
        )
        return

    if awaiting == 'count':
        if not text.strip().isdigit() or int(text.strip()) < 1:
            await update.message.reply_text("❌ Sirf positive number daalo! Jaise: `50`", parse_mode='Markdown')
            return
        count = int(text.strip())
        if user_id not in user_sessions:
            user_sessions[user_id] = {}
        user_sessions[user_id]['count'] = count
        save_all_data()
        context.user_data['awaiting'] = None

        display = user_sessions[user_id].get('target_display', user_sessions[user_id].get('target_chat', '?'))
        msg_preview = user_sessions[user_id].get('message', '')[:80]
        speed = user_speeds.get(str(user_id), 'normal')
        config = SPEED_OPTIONS[speed]
        est_time = count * config['delay']
        mins = int(est_time // 60)
        secs = int(est_time % 60)

        keyboard = [
            [InlineKeyboardButton("🚀 START SENDING", callback_data="send_now")],
            [InlineKeyboardButton("❌ Cancel", callback_data="cancel")]
        ]
        await update.message.reply_text(
            f"📋 *Final Review:*\n\n"
            f"📱 Target: *{display}*\n"
            f"📝 Message: `{msg_preview}`\n"
            f"🔢 Messages: *{count}*\n"
            f"⚡ Speed: *{config['name']}*\n"
            f"⏱️ Est. Time: *{mins}m {secs}s*\n\n"
            f"Sab sahi hai? Start karo!",
            parse_mode='Markdown', reply_markup=InlineKeyboardMarkup(keyboard)
        )
        return

    if awaiting == 'add_user_id':
        try:
            new_uid = int(text)
            AUTHORIZED_USERS.add(new_uid)
            save_all_data()
            context.user_data['awaiting'] = None
            await update.message.reply_text(f"✅ User `{new_uid}` added!", parse_mode='Markdown')
        except ValueError:
            await update.message.reply_text("❌ Invalid user ID (must be a number)")
        return

    if awaiting == 'remove_user_id':
        try:
            rem_uid = int(text)
            AUTHORIZED_USERS.discard(rem_uid)
            save_all_data()
            context.user_data['awaiting'] = None
            await update.message.reply_text(f"✅ User `{rem_uid}` removed!", parse_mode='Markdown')
        except ValueError:
            await update.message.reply_text("❌ Invalid user ID (must be a number)")
        return

async def show_tasks(update: Update, context: ContextTypes.DEFAULT_TYPE):
    if update.effective_user.id != OWNER_ID: return
    
    if not active_tasks:
        await update.message.reply_text("✅ No active tasks")
        return
    
    msg = "📊 **ACTIVE TASKS:**\n\n"
    for uid, task in active_tasks.items():
        status = task_status.get(uid, {})
        msg += f"👤 `{uid}`: {status.get('progress', 0)}/{status.get('total', '?')} "
        msg += f"({SPEED_OPTIONS[status.get('speed', 'normal')]['name']})\n"
    
    keyboard = [[InlineKeyboardButton("🛑 TERMINATE ALL", callback_data="terminate_all")]]
    await update.message.reply_text(msg, reply_markup=InlineKeyboardMarkup(keyboard), parse_mode='Markdown')

def main():
    load_all_data()
    app = Application.builder().token(BOT_TOKEN).build()
    
    app.add_handler(CommandHandler("start", start))
    app.add_handler(CommandHandler("tasks", show_tasks))
    app.add_handler(CallbackQueryHandler(button_handler))
    app.add_handler(MessageHandler(filters.TEXT & ~filters.COMMAND, handle_message))
    
    print("🚀 OPTIMIZED BOT STARTED!")
    print(f"👑 Owner: {OWNER_ID} | 👥 Users: {len(AUTHORIZED_USERS)}")
    app.run_polling()

if __name__ == '__main__':
    main()

# Speed settings (seconds between messages)
SPEED_OPTIONS = {
    'ultra': {'delay': 0.5, 'name': '⚡ ULTRA (120/min)', 'emoji': '🔴'},
    'fast': {'delay': 1.0, 'name': '🚀 FAST (60/min)', 'emoji': '🟡'},
